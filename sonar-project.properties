# SonarCloud / SonarQube project configuration
# Docs: https://docs.sonarcloud.io/advanced-setup/ci-based-analysis/github-actions-for-sonarcloud/

sonar.projectKey=Investments-Assistant_investments-assistant
sonar.organization=investments-assistant

# Source and test directories
sonar.sources=src
sonar.tests=tests

# Python version
sonar.python.version=3.12

# Coverage report (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Exclude static assets and generated files from analysis
sonar.exclusions=src/web/static/**,**/__pycache__/**,**/*.pyc
sonar.coverage.exclusions=tests/**,src/web/static/**

# Encoding
sonar.sourceEncoding=UTF-8
