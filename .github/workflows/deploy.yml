name: Deploy to EKS

on:
  push:
    branches: [main]
    paths:
      - "k8s/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  AWS_REGION: eu-south-2
  CLUSTER_NAME: investments-assistant

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Apply namespace and config
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/serviceaccount.yaml
          kubectl apply -f k8s/reports-pvc.yaml
          kubectl apply -f k8s/external-secrets.yaml

      - name: Deploy services
        run: |
          for svc in llm gateway market-data news portfolio simulation scheduler forex; do
            dir="k8s/$svc"
            if [ -d "$dir" ]; then
              kubectl apply -f "$dir/"
            fi
          done

      - name: Apply ingress
        run: kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollouts
        run: |
          for deploy in llm gateway market-data news portfolio simulation scheduler forex; do
            kubectl rollout status deployment/$deploy -n investments --timeout=300s || true
          done

      - name: Show pod status
        run: kubectl get pods -n investments
