name: Deploy to EKS

on:
  push:
    branches: [main]
    paths:
      - "k8s/**"
      - "terraform/**"
      - "scripts/render_ingress.py"
      - "Makefile"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  AWS_REGION: eu-south-2
  CLUSTER_NAME: investments-assistant
  HELM_CHARTS_DIR: helm-charts
  AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN || secrets.AWS_DEPLOY_ROLE_ARN }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout Helm charts
        uses: actions/checkout@v4
        with:
          repository: Investments-Assistant/helm-charts
          path: helm-charts

      - name: Check AWS OIDC role configuration
        run: |
          if [ -z "$AWS_DEPLOY_ROLE_ARN" ]; then
            echo "::error::Set AWS_DEPLOY_ROLE_ARN as a repository variable."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Initialize OpenTofu
        run: make tf-init

      - name: Update kubeconfig
        run: make kubeconfig

      - name: Render Kubernetes manifests
        run: make k8s-render

      - name: Apply rendered manifests
        run: make k8s-apply K8S_MANIFEST_DIR=.rendered/k8s

      - name: Wait for rollouts
        run: make k8s-rollout-status

      - name: Update Route 53 alias
        run: make route53-alias

      - name: Show pod status
        run: make k8s-status
