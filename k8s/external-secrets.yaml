# External Secrets Operator (ESO) — pulls secrets from AWS Secrets Manager.
# Install ESO first: https://external-secrets.io/latest/introduction/getting-started/
#
# Create the AWS secret with:
#   aws secretsmanager create-secret --name investments/prod \
#     --secret-string '{"POSTGRES_PASSWORD":"...","UI_AUTH_USERNAME":"investments","UI_AUTH_PASSWORD":"...",...}'
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets
  namespace: investments
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-south-2
      auth:
        jwt:
          serviceAccountRef:
            name: investments-sa  # IRSA service account
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: investments-secrets
  namespace: investments
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: aws-secrets
    kind: SecretStore
  target:
    name: investments-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: investments/prod
