apiVersion: apps/v1
kind: Deployment
metadata:
  name: news
  namespace: investments
  labels:
    app: news
spec:
  replicas: 1
  selector:
    matchLabels:
      app: news
  template:
    metadata:
      labels:
        app: news
    spec:
      serviceAccountName: investments-sa
      containers:
        - name: news
          image: ACCOUNT.dkr.ecr.eu-south-2.amazonaws.com/investments-news:latest
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: investments-config
            - secretRef:
                name: investments-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
