# AWS Load Balancer Controller Ingress
# The ALB is internet-facing but guarded by WAF with an IP allowlist rule
# (configured in OpenTofu). This is the only externally reachable service.
#
# Prerequisites:
#   1. AWS Load Balancer Controller installed in the cluster
#   2. AWS WAF WebACL created by OpenTofu (see the terraform-modules waf module)
#   3. Optional ACM certificate ARN rendered below for HTTPS
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: investments-ingress
  namespace: investments
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # TLS - rendered from OpenTofu output acm_certificate_arn by make deploy-e2e
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:eu-south-2:ACCOUNT:certificate/CERT_ID
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80,"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # WAF — replace with your WebACL ARN (created by OpenTofu)
    alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:eu-south-2:ACCOUNT:regional/webacl/investments-allowlist/WEBACL_ID
    # Cognito authentication - rendered from OpenTofu outputs when enabled
    alb.ingress.kubernetes.io/auth-type: cognito
    alb.ingress.kubernetes.io/auth-scope: openid email profile
    alb.ingress.kubernetes.io/auth-session-timeout: "43200"
    alb.ingress.kubernetes.io/auth-on-unauthenticated-request: authenticate
    alb.ingress.kubernetes.io/auth-idp-cognito: '{"userPoolARN":"REPLACE_WITH_COGNITO_USER_POOL_ARN","userPoolClientID":"REPLACE_WITH_COGNITO_APP_CLIENT_ID","userPoolDomain":"REPLACE_WITH_COGNITO_USER_POOL_DOMAIN"}'
    # Health check
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    # ALB access logs
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=600,access_logs.s3.enabled=true,access_logs.s3.bucket=investments-alb-logs,access_logs.s3.prefix=investments
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8000
