apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: investments
  labels:
    app: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      serviceAccountName: investments-sa
      containers:
        - name: portfolio
          image: ACCOUNT.dkr.ecr.eu-south-2.amazonaws.com/investments-portfolio:latest
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: investments-config
            - secretRef:
                name: investments-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "384Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10
