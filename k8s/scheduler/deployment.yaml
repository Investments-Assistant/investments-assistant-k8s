apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: investments
  labels:
    app: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      serviceAccountName: investments-sa
      containers:
        - name: scheduler
          image: ACCOUNT.dkr.ecr.eu-south-2.amazonaws.com/investments-scheduler:latest
          ports:
            - containerPort: 8005
          envFrom:
            - configMapRef:
                name: investments-config
            - secretRef:
                name: investments-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "384Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: reports
              mountPath: /app/reports
      volumes:
        - name: reports
          persistentVolumeClaim:
            claimName: reports-pvc
