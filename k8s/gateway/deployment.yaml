apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: investments
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      serviceAccountName: investments-sa
      containers:
        - name: gateway
          image: ACCOUNT.dkr.ecr.eu-south-2.amazonaws.com/investments-gateway:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: investments-config
            - secretRef:
                name: investments-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: reports
              mountPath: /app/reports
      volumes:
        - name: reports
          persistentVolumeClaim:
            claimName: reports-pvc
